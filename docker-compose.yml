services:
  primary:
    image: postgres:16
    container_name: postgres-primary
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: labdb
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c listen_addresses='*'
    ports:
      - "5432:5432"

  replica:
    image: postgres:16
    container_name: postgres-replica
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    depends_on:
      - primary
    ports:
      - "5433:5432"